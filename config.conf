APP_NAME="LSYM - Linux System Management Center"
LOG_FILE="/tmp/lsym.log"
TMP_FILE="/tmp/lsym_tmp"
BACKUP_PATH="/var/backups/lsym"
HEIGHT=24
WIDTH=80
MENU_HEIGHT=14
USE_COLORS=1
USE_SHADOW=1
LOG_LEVEL="INFO"
LOG_TO_FILE="yes"
LOG_TO_CONSOLE="no"
LOG_MAX_SIZE=10
LOG_RETENTION=5
ALERT_CONFIG_FILE="${BASE_DIR}/alert_config.conf"
ALERT_LOG_FILE="${BASE_DIR}/alerts.log"
ALERTS_ENABLED="yes"
CPU_LOAD_THRESHOLD=5.0
MEMORY_THRESHOLD=90
DISK_THRESHOLD=85
INODE_THRESHOLD=85
FAILED_SERVICES_THRESHOLD=2
ALERT_EMAIL="admin@localhost"
EMAIL_NOTIFICATIONS="no"
BACKUP_COMPRESSION="gzip"
BACKUP_ENCRYPT="no"
BACKUP_RETENTION_DAYS=30
BACKUP_SCHEDULE="daily"
BACKUP_EXCLUDE="*.tmp *.cache *.log"
BACKUP_INCLUDE_HIDDEN="yes"
AUTO_CLEANUP="yes"
CLEANUP_INTERVAL=7
TEMP_FILE_AGE=3
LOG_FILE_AGE=30
CLEAN_PACKAGE_CACHE="yes"
CLEAN_OLD_KERNELS="no"
DEFAULT_DNS="8.8.8.8 1.1.1.1"
DEFAULT_GATEWAY=""
WIFI_COUNTRY="US"
NETWORK_SCAN_TIMEOUT=30
PING_DEFAULT_COUNT=4
AUTO_UPDATE_PACKAGES="no"
UPDATE_INTERVAL=7
PKG_MANAGER="auto"
INSTALL_RECOMMENDS="yes"
DEFAULT_SHELL="/bin/bash"
DEFAULT_HOME_PREFIX="/home"
DEFAULT_USER_GROUPS=""
MIN_UID=1000
MAX_UID=60000
ENABLE_USER_QUOTAS="no"
DEFAULT_SOFT_QUOTA=1024
DEFAULT_HARD_QUOTA=2048
DEFAULT_FIREWALL="ufw"
FIREWALL_AUTO_ENABLE="yes"
ALLOW_SSH_ANY="no"
RATE_LIMIT_SSH="yes"
SSH_MAX_CONNECTIONS=3
SSH_TIMEOUT=300
ENABLE_FAIL2BAN="no"
PASSWORD_MIN_LENGTH=8
PASSWORD_COMPLEXITY="medium"
PASSWORD_EXPIRY_DAYS=90
MONITOR_INTERVAL=60
PERFORMANCE_LOGGING="yes"
PERFORMANCE_RETENTION=30
DISPLAY_GRAPHS="yes"
MONITOR_REFRESH=2
DATE_FORMAT="%Y-%m-%d %H:%M:%S"
TIMEZONE=""
USE_24HOUR="yes"
DEFAULT_EDITOR="nano"
DEBUG_MODE="no"
SHOW_TIPS="yes"
LANGUAGE="en"
ROOT_ONLY_OPS="yes"
CONFIRM_DESTRUCTIVE="yes"
DISK_TIMEOUT=30
MAX_CONCURRENT_OPS=4
USE_SYSTEMD="yes"
USE_SYSV_INIT="yes"
IFACE_NAMING="predictable"
ENABLE_IPV6="yes"
SSH_KEY_MANAGEMENT="yes"
ENABLE_DISK_ENCRYPTION="yes"
ENABLE_RAID="yes"
ENABLE_LVM="yes"
ENABLE_DOCKER="yes"
DOCKER_COMPOSE="yes"
ENABLE_SNAP="yes"
ENABLE_FLATPAK="yes"
ENABLE_PLUGINS="yes"
PLUGIN_DIR="${BASE_DIR}/plugins"
AUTO_LOAD_PLUGINS="yes"
ENABLE_API="no"
API_PORT=8080
API_TOKEN=""
ENABLE_WEB="no"
WEB_PORT=3000